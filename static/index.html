<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>IB Portfolio</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📊</text></svg>">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', monospace; background: #1e1e1e; color: #d4d4d4; padding: 2rem; }
    h1 { color: #4ec9b0; margin-bottom: 1rem; font-size: 1.6rem; }
    h2 { color: #9cdcfe; margin: 1.5rem 0 0.5rem; font-size: 1.1rem; }

    .badges { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap; align-items: center; }
    .badge {
      background: #2d2d2d; border: 1px solid #3e3e3e;
      padding: 4px 12px; border-radius: 20px; font-size: 0.8rem;
    }
    .badge.green { border-color: #4ec9b0; color: #4ec9b0; }
    .badge.blue  { border-color: #9cdcfe; color: #9cdcfe; }
    .badge.gray  { border-color: #888; color: #888; }

    .account-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem; margin-bottom: 1.5rem;
    }
    .account-card {
      background: #252526; border: 1px solid #3e3e3e;
      border-radius: 8px; padding: 1rem;
    }
    .account-card .label { font-size: 0.75rem; color: #888; margin-bottom: 4px; }
    .account-card .value { font-size: 1.2rem; font-weight: bold; color: #d4d4d4; }

    /* Tabs */
    .tabs { display: flex; gap: 0; margin-bottom: 0; border-bottom: 1px solid #3e3e3e; }
    .tab {
      padding: 8px 20px; cursor: pointer; font-size: 0.9rem;
      color: #888; border: 1px solid transparent;
      border-bottom: none; border-radius: 6px 6px 0 0;
      background: transparent;
    }
    .tab:hover { color: #d4d4d4; }
    .tab.active { background: #252526; border-color: #3e3e3e; color: #4ec9b0; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    table { width: 100%; border-collapse: collapse; background: #252526; border-radius: 0 8px 8px 8px; overflow: hidden; }
    th { background: #2d2d2d; color: #9cdcfe; padding: 10px 12px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }
    td { padding: 10px 12px; border-bottom: 1px solid #2d2d2d; font-size: 0.9rem; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: #2a2a2a; }

    .pos { color: #4ec9b0; }
    .neg { color: #f48771; }
    .buy  { color: #4ec9b0; font-weight: bold; }
    .sell { color: #f48771; font-weight: bold; }

    .refresh-btn {
      background: #2d2d2d; color: #4ec9b0;
      border: 1px solid #4ec9b0; padding: 6px 16px;
      border-radius: 4px; cursor: pointer; font-size: 0.85rem;
      margin-left: auto;
    }
    .refresh-btn:hover { background: #3e3e3e; }

    .last-updated { font-size: 0.75rem; color: #555; margin-top: 1.5rem; }
  </style>
</head>
<body>
  <h1>📊 IB Portfolio Viewer</h1>

  <div class="badges" id="badges">
    <span class="badge gray">Loading...</span>
    <button class="refresh-btn" onclick="load()">🔄 Refresh</button>
  </div>

  <h2>Account Summary</h2>
  <div class="account-grid" id="account">
    <div class="account-card"><div class="label">Status</div><div class="value">Loading...</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('positions')">Positions</div>
    <div class="tab" onclick="switchTab('transactions')">Transaction History</div>
  </div>

  <div id="positions" class="tab-content active">Loading...</div>
  <div id="transactions" class="tab-content">Loading...</div>

  <p class="last-updated" id="last-updated"></p>

  <script>
    function fmt(val, prefix = '$') {
      const n = parseFloat(val);
      if (isNaN(n)) return '—';
      return prefix + n.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function pnlClass(val) { return parseFloat(val) >= 0 ? 'pos' : 'neg'; }

    function switchTab(name) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', ['positions','transactions'][i] === name);
      });
      document.querySelectorAll('.tab-content').forEach(c => {
        c.classList.toggle('active', c.id === name);
      });
    }

    async function load() {
      try {
        const [statusRes, accountRes, portfolioRes, txRes] = await Promise.all([
          fetch('/api/status'),
          fetch('/api/account'),
          fetch('/api/portfolio'),
          fetch('/api/transactions'),
        ]);

        const status    = await statusRes.json();
        const account   = await accountRes.json();
        const portfolio = await portfolioRes.json();
        const txData    = await txRes.json();

        // Badges
        document.getElementById('badges').innerHTML = `
          <span class="badge green">🟢 Connected</span>
          <span class="badge blue">📂 CSV Mode</span>
          <span class="badge green">🔒 Read-Only</span>
          <button class="refresh-btn" onclick="load()">🔄 Refresh</button>`;

        // Account cards
        const cards = [
          { label: 'Net Liquidation',      key: 'NetLiquidation' },
          { label: 'Total Cash',           key: 'TotalCashValue' },
          { label: 'Gross Position Value', key: 'GrossPositionValue' },
          { label: 'Unrealized P&L',       key: 'UnrealizedPnL', pnl: true },
          { label: 'Realized P&L',         key: 'RealizedPnL',   pnl: true },
        ];
        document.getElementById('account').innerHTML = cards.map(c => {
          const val = account[c.key];
          const cls = c.pnl ? pnlClass(val) : '';
          return `<div class="account-card">
            <div class="label">${c.label}</div>
            <div class="value ${cls}">${fmt(val)}</div>
          </div>`;
        }).join('');

        // Positions table
        const positions = portfolio.positions;
        if (!positions || positions.length === 0) {
          document.getElementById('positions').innerHTML =
            '<p style="color:#888; padding:1rem;">No open positions found.</p>';
        } else {
          const rows = positions.map(p => `
            <tr>
              <td><strong>${p.symbol}</strong></td>
              <td>${p.sec_type}</td>
              <td>${p.currency}</td>
              <td>${p.position}</td>
              <td>${fmt(p.market_price)}</td>
              <td>${fmt(p.market_value)}</td>
              <td>${fmt(p.avg_cost)}</td>
              <td class="${pnlClass(p.unrealized_pnl)}">${fmt(p.unrealized_pnl)}</td>
              <td class="${pnlClass(p.realized_pnl)}">${fmt(p.realized_pnl)}</td>
            </tr>`).join('');
          document.getElementById('positions').innerHTML = `
            <table>
              <thead><tr>
                <th>Symbol</th><th>Type</th><th>Currency</th><th>Shares</th>
                <th>Price</th><th>Market Value</th><th>Avg Cost</th>
                <th>Unrealized P&L</th><th>Realized P&L</th>
              </tr></thead>
              <tbody>${rows}</tbody>
            </table>`;
        }

        // Transactions table
        const txs = txData.transactions;
        if (!txs || txs.length === 0) {
          document.getElementById('transactions').innerHTML =
            '<p style="color:#888; padding:1rem;">No transactions found.</p>';
        } else {
          const txRows = txs.map(t => `
            <tr>
              <td>${t.date}</td>
              <td><strong>${t.symbol}</strong></td>
              <td class="${t.action === 'BUY' ? 'buy' : 'sell'}">${t.action}</td>
              <td>${t.quantity}</td>
              <td>${fmt(t.price)}</td>
              <td>${fmt(t.value)}</td>
              <td>${fmt(t.commission)}</td>
              <td class="${pnlClass(t.realized_pnl)}">${t.realized_pnl > 0 ? fmt(t.realized_pnl) : '—'}</td>
            </tr>`).join('');
          document.getElementById('transactions').innerHTML = `
            <table>
              <thead><tr>
                <th>Date</th><th>Symbol</th><th>Action</th><th>Qty</th>
                <th>Price</th><th>Value</th><th>Commission</th><th>Realized P&L</th>
              </tr></thead>
              <tbody>${txRows}</tbody>
            </table>`;
        }

        document.getElementById('last-updated').textContent =
          `Last updated: ${new Date().toLocaleTimeString()} · Source: CSV`;

      } catch (err) {
        document.getElementById('badges').innerHTML =
          `<span class="badge" style="border-color:#f48771;color:#f48771">🔴 Error: ${err.message}</span>`;
        console.error(err);
      }
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
