<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | Mango Fi</title>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body>
    <main>
      <h1 name="login-title">Mango Fi Login</h1>
      <form id="login-form">
        <input id="username" placeholder="Username" required />
        <input id="password" type="password" placeholder="Password" required />
        <button type="submit">Sign In</button>
      </form>
      <p id="error" style="color: red"></p>
    </main>

    <script>
      const form = document.getElementById("login-form");
      const err = document.getElementById("error");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();
        err.textContent = "";

        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            username: document.getElementById("username").value,
            password: document.getElementById("password").value,
          }),
        });

        if (res.ok) {
          window.location.href = "/";
        } else {
          err.textContent = "Invalid username or password.";
        }
      });
      /*Runs the form declared in script (login.html)
    #user types username/password and clicks sign in
    #preventDefault() stops normal form submission -> which would reload the page
    #JS POSTs JSON to /api/auth/login
    */
    </script>
  </body>
</html>
